<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đồng Hồ Thế Giới</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Giả lập khung màn hình điện thoại để hiển thị đẹp mắt */
        .phone-container {
            width: 100%;
            max-width: 412px;
            height: 100vh;
            max-height: 892px;
            background-color: #000000;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 400;
        }

        .header-icons {
            display: flex;
            gap: 20px;
            font-size: 24px;
            color: #ffffff;
            cursor: pointer;
        }

        /* Analog Clock (Đồng hồ kim) */
        .clock-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
        }

        .analog-clock {
            width: 230px;
            height: 230px;
            background: radial-gradient(circle, #fcfcfc 0%, #e5e5e7 100%);
            border-radius: 50%;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05), 0 4px 20px rgba(0,0,0,0.2);
        }

        /* Số trên mặt đồng hồ */
        .number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: 18px;
            font-weight: 500;
            color: #1c1c1e;
            padding: 8px;
        }

        /* Xoay các số về đúng vị trí đường tròn */
        .number1 { transform: rotate(30deg); } .number1 span { transform: rotate(-30deg); }
        .number2 { transform: rotate(60deg); } .number2 span { transform: rotate(-60deg); }
        .number3 { transform: rotate(90deg); } .number3 span { transform: rotate(-90deg); }
        .number4 { transform: rotate(120deg); } .number4 span { transform: rotate(-120deg); }
        .number5 { transform: rotate(150deg); } .number5 span { transform: rotate(-150deg); }
        .number6 { transform: rotate(180deg); } .number6 span { transform: rotate(-180deg); }
        .number7 { transform: rotate(210deg); } .number7 span { transform: rotate(-210deg); }
        .number8 { transform: rotate(240deg); } .number8 span { transform: rotate(-240deg); }
        .number9 { transform: rotate(270deg); } .number9 span { transform: rotate(-270deg); }
        .number10 { transform: rotate(300deg); } .number10 span { transform: rotate(-300deg); }
        .number11 { transform: rotate(330deg); } .number11 span { transform: rotate(-330deg); }
        .number12 { transform: rotate(0deg); } .number12 span { transform: rotate(0deg); }

        .number span {
            display: inline-block;
        }

        /* Kim đồng hồ */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 4px;
        }

        .hour-hand {
            width: 6px;
            height: 55px;
            background-color: #1c1c1e;
            margin-left: -3px;
            z-index: 2;
        }

        .minute-hand {
            width: 4px;
            height: 75px;
            background-color: #1c1c1e;
            margin-left: -2px;
            z-index: 3;
        }

        .second-hand {
            width: 2px;
            height: 85px;
            background-color: #3b82f6; /* Màu xanh nước biển */
            margin-left: -1px;
            z-index: 4;
        }

        /* Tâm đồng hồ */
        .center-dot {
            width: 10px;
            height: 10px;
            background-color: #3b82f6;
            border: 2px solid #ffffff;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
        }

        /* Vạch chia phút nhỏ phụ */
        .ticks {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }
        
        /* Digital Info (Khu vực giờ số bên dưới) */
        .digital-info {
            text-align: center;
            margin-bottom: 35px;
        }

        .time-digital {
            font-size: 32px;
            font-weight: 400;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            letter-spacing: 1px;
        }

        .heart-icon {
            font-size: 20px;
            color: #ffffff;
            opacity: 0.9;
            margin: 0 2px;
        }

        .date-subtext {
            color: #8e8e93;
            font-size: 15px;
            margin-top: 8px;
        }

        /* Danh sách thành phố (Card Hà Nội) */
        .city-card {
            background-color: #1c1c1e;
            border-radius: 20px;
            padding: 22px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: auto; /* Đẩy nav bar xuống đáy */
        }

        .city-left h2 {
            font-size: 22px;
            font-weight: 400;
            margin-bottom: 6px;
        }

        .city-left p {
            color: #8e8e93;
            font-size: 13px;
        }

        .city-right {
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Bottom Navigation Bar */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #1c1c1e;
            padding-top: 12px;
            padding-bottom: 10px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #8e8e93;
            font-size: 11px;
            gap: 5px;
            cursor: pointer;
        }

        .nav-item.active {
            color: #ffffff;
        }

        .nav-icon {
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <!-- Header -->
        <div class="header">
            <h1>Đồng hồ thế giới</h1>
            <div class="header-icons">
                <span>＋</span>
                <span>⋮</span>
            </div>
        </div>

        <!-- Mặt đồng hồ kim -->
        <div class="clock-container">
            <div class="analog-clock">
                <!-- Các số từ 1 đến 12 -->
                <div class="number number1"><span>1</span></div>
                <div class="number number2"><span>2</span></div>
                <div class="number number3"><span>3</span></div>
                <div class="number number4"><span>4</span></div>
                <div class="number number5"><span>5</span></div>
                <div class="number number6"><span>6</span></div>
                <div class="number number7"><span>7</span></div>
                <div class="number number8"><span>8</span></div>
                <div class="number number9"><span>9</span></div>
                <div class="number number10"><span>10</span></div>
                <div class="number number11"><span>11</span></div>
                <div class="number number12"><span>12</span></div>

                <!-- Kim -->
                <div class="hand hour-hand" id="hour-hand"></div>
                <div class="hand minute-hand" id="min-hand"></div>
                <div class="hand second-hand" id="sec-hand"></div>
                <div class="center-dot"></div>
            </div>
        </div>

        <!-- Giờ số và ngày tháng ở giữa -->
        <div class="digital-info">
            <div class="time-digital">
                <span id="d-hour">10</span>
                <span class="heart-icon">❤</span>
                <span id="d-min">06</span>
                <span class="heart-icon">❤</span>
                <span id="d-sec">13</span>
            </div>
            <div class="date-subtext">
                Giờ địa phương <span id="d-date">18 thg 7</span>
            </div>
        </div>

        <!-- Thẻ Thành phố Hà Nội -->
        <div class="city-card">
            <div class="city-left">
                <h2>Hà Nội</h2>
                <p><span id="card-date">18 thg 7</span> | Như giờ địa phương</p>
            </div>
            <div class="city-right">
                <span id="card-hour">10</span>
                <span class="heart-icon" style="font-size: 18px;">❤</span>
                <span id="card-min">06</span>
            </div>
        </div>

        <!-- Thanh điều hướng dưới đáy -->
        <div class="bottom-nav">
            <div class="nav-item">
                <span class="nav-icon">⏰</span>
                <span>Báo thức</span>
            </div>
            <div class="nav-item active">
                <span class="nav-icon">🕒</span>
                <span>Đồng hồ thế giới</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">⏱️</span>
                <span>Bấm giờ</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">⏳</span>
                <span>Hẹn giờ</span>
            </div>
        </div>
    </div>

    <script>
        const hourHand = document.getElementById('hour-hand');
        const minHand = document.getElementById('min-hand');
        const secHand = document.getElementById('sec-hand');

        const dHour = document.getElementById('d-hour');
        const dMin = document.getElementById('d-min');
        const dSec = document.getElementById('d-sec');
        const dDate = document.getElementById('d-date');

        const cardHour = document.getElementById('card-hour');
        const cardMin = document.getElementById('card-min');
        const cardDate = document.getElementById('card-date');

        function updateClock() {
            const now = new Date();

            // Lấy thời gian thực
            const seconds = now.getSeconds();
            const minutes = now.getMinutes();
            const hours = now.getHours();

            // Tính góc xoay cho kim đồng hồ
            const secDegrees = (seconds / 60) * 360;
            const minDegrees = ((minutes / 60) * 360) + ((seconds / 60) * 6);
            const hourDegrees = ((hours % 12) / 12) * 360 + ((minutes / 60) * 30);

            secHand.style.transform = `rotate(${secDegrees}deg)`;
            minHand.style.transform = `rotate(${minDegrees}deg)`;
            hourHand.style.transform = `rotate(${hourDegrees}deg)`;

            // Cập nhật phần đồng hồ số hiển thị (Thêm số 0 phía trước nếu < 10)
            const formatHour = String(hours).padStart(2, '0');
            const formatMin = String(minutes).padStart(2, '0');
            const formatSec = String(seconds).padStart(2, '0');

            dHour.textContent = formatHour;
            dMin.textContent = formatMin;
            dSec.textContent = formatSec;

            cardHour.textContent = formatHour;
            cardMin.textContent = formatMin;

            // Định dạng ngày tháng dạng "18 thg 7" chuẩn Tiếng Việt
            const day = now.getDate();
            const month = now.getMonth() + 1; // Tháng trong JS tính từ 0-11
            const dateString = `${day} thg ${month}`;

            dDate.textContent = dateString;
            cardDate.textContent = dateString;
        }

        // Chạy hàm cập nhật mỗi giây (1000ms)
        setInterval(updateClock, 1000);

        // Chạy ngay lần đầu tiên khi load trang
        updateClock();
    </script>
</body>
</html>
