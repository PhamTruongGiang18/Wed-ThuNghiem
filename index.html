<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Ảnh Cuộn Nổi & Xem Toàn Màn Hình</title>
</head>
<body>

    <div class="image-list-container">
        <div class="image-item">

        <div class="image-item">

        </div>
        <div class="image-item">
            <img src="https://i.postimg.cc/N00yTNYh/IMG-20260613-134238.jpg" alt="Anh4">
        </div>
        <div class="image-item">
            <img src="https://i.postimg.cc/FskWj4mC/IMG-20260627-190639.jpg" alt="Anh5">
        </div>
        <div class="image-item">
            <img src="https://i.postimg.cc/15ccCgq8/IMG-20260627-190641.jpg" alt="Anh6">
        </div>
        <div class="image-item">
            <img src="https://i.postimg.cc/JhtNzPdX/IMG-20260627-190652.jpg" alt="Anh7">
        </div>
        <div class="image-item">
            <img src="https://i.postimg.cc/prMzkxVL/IMG-20260627-190657.jpg" alt="Anh8">
        </div>
        <div class="image-item">
            <img src="https://i.postimg.cc/5N3L5Zhx/IMG-20260627-190708.jpg" alt="Anh9">
        </div>
        <div class="image-item">
            <img src="https://i.postimg.cc/7ZtzdSYk/IMG-20260627-190716.jpg" alt="Anh10">
        </div>
        <div class="image-item">
            <img src="https://i.postimg.cc/KYdMvFMr/IMG-20260627-190712.jpg" alt="Anh11">
        </div>
        <div class="image-item">
            <img src="https://i.postimg.cc/g2V5KkYN/IMG-20260627-190723.jpg" alt="Anh12">
        </div>
        <div class="image-item">
            <img src="" alt="Anh13">
        </div>
        <div class="image-item">
            <img src="" alt="Anh14">
        </div>
        <div class="image-item">
            <img src="" alt="Anh15">
        </div>
    </div>

    <div id="imageModal" class="modal-overlay">
        <span class="close-btn">&times;</span>
        <img id="modalImg" class="modal-content" alt="Ảnh phóng to">
    </div>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            
            /* [BẢO MẬT] Tuyệt đối chống bôi đen văn bản */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body {
            background-color: #f5f5f5;
            padding: 20px 15px;
            font-family: Arial, sans-serif;
        }

        .image-list-container {
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 25px; /* Khoảng cách giữa các ảnh */
        }

        /* --- SỬA HIỆU ỨNG: Cấu hình xuất hiện từ từ rõ ràng hơn --- */
        .image-item {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            cursor: pointer; /* Hiển thị ngón tay khi di chuột vào báo hiệu bấm được */
            
            opacity: 0; /* Ban đầu ẩn hoàn toàn */
            transform: translateY(70px); /* Đẩy sâu xuống dưới 70px để khi nổi lên nhìn rõ hơn */
            
            /* Tăng thời gian chuyển động lên 1.2 giây để hiệu ứng "từ từ nổi lên" chạy siêu mượt */
            transition: opacity 1.2s cubic-bezier(0.215, 0.610, 0.355, 1), 
                        transform 1.2s cubic-bezier(0.215, 0.610, 0.355, 1);
        }

        /* Khi ảnh lọt vào màn hình, class này sẽ được thêm vào để kích hoạt hiệu ứng */
        .image-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .image-item img {
            width: 100%;
            display: block;
            object-fit: cover;
            
            /* [BẢO MẬT] Chống nhấn giữ tải ảnh */
            -webkit-touch-callout: none;
            -webkit-user-drag: none;
            user-drag: none;
        }

        /* --- CSS CHO PHẦN PHÓNG TO ẢNH (MODAL LIGHTBOX) --- */
        .modal-overlay {
            display: none; /* Mặc định ẩn */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.92); /* Nền đen mờ bao phủ */
            z-index: 9999; /* Luôn nằm trên cùng tất cả các phần tử khác */
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Khi kích hoạt hiện khung xem ảnh */
        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            max-width: 95%;
            max-height: 85%;
            border-radius: 8px;
            box-shadow: 0 4px 25px rgba(255, 255, 255, 0.15);
            animation: zoomIn 0.3s ease; /* Hiệu ứng ảnh to dần ra khi bấm */
            
            /* [BẢO MẬT] Chống nhấn giữ lấy ảnh ngay cả khi đang xem phóng to */
            -webkit-touch-callout: none;
            -webkit-user-drag: none;
            user-drag: none;
        }

        /* Nút bấm đóng khung ảnh (Dấu X) */
        .close-btn {
            position: absolute;
            top: 25px;
            right: 30px;
            color: #ffffff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Hiệu ứng phóng to nhẹ cho ảnh modal */
        @keyframes zoomIn {
            from { transform: scale(0.8); }
            to { transform: scale(1); }
        }
    </style>

    <script>
        // --- 1. XỬ LÝ HIỆU ỨNG CUỘN ĐẾN ĐÂU NỔI TỪ TỪ LÊN ĐẾN ĐÓ ---
        const items = document.querySelectorAll('.image-item');

        const observerOptions = {
            root: null,
            threshold: 0.05, // Chỉ cần 5% diện tích ảnh nhô vào màn hình là lập tức kích hoạt nổi lên
            rootMargin: "0px 0px -20px 0px"
        };

        const appearanceObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                } else {
                    entry.target.classList.remove('visible');
                }
            });
        }, observerOptions);

        items.forEach(item => {
            appearanceObserver.observe(item);
        });


        // --- 2. XỬ LÝ ẤN VÀO XEM ĐƯỢC ẢNH LUÔN (PHÓNG TO TOÀN MÀN HÌNH) ---
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImg');
        const closeBtn = document.querySelector('.close-btn');

        // Lắng nghe sự kiện click trên từng khối ảnh
        items.forEach(item => {
            const img = item.querySelector('img');
            item.addEventListener('click', () => {
                modal.style.display = 'flex';
                // Đợi 10ms để trình duyệt kịp render rồi mới thêm class hiệu ứng mượt
                setTimeout(() => {
                    modal.classList.add('show');
                }, 10);
                modalImg.src = img.src; // Copy đường link ảnh nhỏ bỏ vào khung ảnh to
            });
        });

        // Hàm đóng khung ảnh phóng to
        function closeModal() {
            modal.classList.remove('show');
            setTimeout(() => {
                modal.style.display = 'none';
            }, 300); // Đợi hiệu ứng mờ dần chạy xong rồi ẩn hẳn
        }

        // Ấn vào dấu X để đóng ảnh
        closeBtn.addEventListener('click', closeModal);

        // Hoặc ấn vào vùng nền đen bất kỳ bên ngoài ảnh cũng tự đóng ảnh luôn cho tiện
        modal.addEventListener('click', (event) => {
            if (event.target === modal) {
                closeModal();
            }
        });


        // --- 3. [BẢO MẬT] HỆ THỐNG CHỐNG COPY TUYỆT ĐỐI ---
        document.addEventListener('contextmenu', (event) => {
            event.preventDefault();
        });

        document.addEventListener('dragstart', (event) => {
            event.preventDefault();
        });

        document.addEventListener('keydown', (event) => {
            if (event.ctrlKey && (event.key === 'c' || event.key === 'u' || event.key === 's' || event.key === 'a' || event.key === 'C' || event.key === 'U' || event.key === 'S' || event.key === 'A')) {
                event.preventDefault();
                return false;
            }
            if (event.key === 'F12') {
                event.preventDefault();
                return false;
            }
        });
    </script>
</body>
</html>
